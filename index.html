<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Draft Ticker</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .wrapper {
      width: 100vw;
      height: 120px;
      overflow: hidden;
      display: flex;
      align-items: center;
      white-space: nowrap;
      background: transparent;
      position: relative;
    }

    .track {
      display: flex;
      flex-wrap: nowrap;
      white-space: nowrap;
      will-change: transform;
      transform: translate3d(0,0,0);
    }

    .ticker-copy {
      flex: 0 0 auto;
      white-space: nowrap;
      padding-right: 140px;
      font-size: 60px;
      font-weight: 800;
      color: white !important;
      -webkit-text-fill-color: white !important;
      text-shadow:
        0 0 3px #fff,
        0 0 6px rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="track" id="track">
      <div class="ticker-copy" id="copy1"></div>
      <div class="ticker-copy" id="copy2"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxua5n-LD77Kl19na_JmIsEX1FXzfs9HE5gUQlhfBVdUYTCtdFlnOeKtmSYiTBxeVl0/exec";

    let lastText = "";
    let offset = 0;
    let pxPerSecond = 68; // smaller = slower
    let lastFrameTime = null;
    let loopWidth = 0;

    function buildLongBase(base) {
      let text = base.trim();
      while (text.length < 700) {
        text += " • " + base.trim();
      }
      return text;
    }

    function applyTicker(base) {
      const longText = buildLongBase(base);
      const copy1 = document.getElementById("copy1");
      const copy2 = document.getElementById("copy2");

      copy1.textContent = longText;
      copy2.textContent = longText;

      requestAnimationFrame(() => {
        loopWidth = copy1.offsetWidth;
      });
    }

    async function loadTicker() {
      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        const data = await res.json();
        const base = (data.ticker || "").trim();

        if (!base) return;

        if (base !== lastText) {
          applyTicker(base);
          lastText = base;
        }
      } catch (e) {
        console.log("Ticker load error", e);
      }
    }

    function animate(timestamp) {
      const track = document.getElementById("track");

      if (lastFrameTime === null) {
        lastFrameTime = timestamp;
      }

      const delta = (timestamp - lastFrameTime) / 1000;
      lastFrameTime = timestamp;

      if (loopWidth > 0) {
        offset += pxPerSecond * delta;

        if (offset >= loopWidth) {
          offset -= loopWidth;
        }

        track.style.transform = `translate3d(${-offset}px, 0, 0)`;
      }

      requestAnimationFrame(animate);
    }

    loadTicker();
    setInterval(loadTicker, 30000);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
