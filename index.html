<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
  font-family: Arial;
}

.wrapper {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: black;
  color: white;
  font-size: 28px;
  white-space: nowrap;
  overflow: hidden;
  height: 60px;
  display: flex;
  align-items: center;
}

.ticker {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 35s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>
<div class="ticker-wrapper">
  <div id="ticker">Loading draft board...</div>
</div>

<script>
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1nf9wRR_x5D9n2vH-Bm4fihU1rxx5V4XA5fBKfVvo4wA/gviz/tq?tqx=out:csv&sheet=TickerData&range=F2";

async function loadTicker() {
  try {
    const res = await fetch(SHEET_URL);
    let text = await res.text();

    // Clean CSV output properly
    text = text
      .replace(/"/g, "")
      .replace(/(\r\n|\n|\r)/gm, "")
      .trim();

    // Debug (VERY IMPORTANT)
    console.log("Ticker Data:", text);

    document.getElementById("ticker").innerText = text;

  } catch (err) {
    console.error(err);
    document.getElementById("ticker").innerText =
      "FAILED TO LOAD SHEET DATA";
  }
}

loadTicker();
setInterval(loadTicker, 5000);
</script>

</body>
</html>
