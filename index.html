<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: transparent;
  font-family: Arial;
}

.wrapper {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: black;
  color: white;
  font-size: 28px;
  white-space: nowrap;
  overflow: hidden;
  height: 60px;
  display: flex;
  align-items: center;
}

.ticker {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 35s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}
</style>
</head>

<body>
<div class="ticker-wrapper">
  <div id="ticker">Loading draft board...</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  document.getElementById("ticker").innerText =
    "TRAVIS HUNTER (CB, COLORADO) • WILL JOHNSON (CB, MICHIGAN) • KELVIN BANKS (OT, TEXAS)";
});
</script>

</body>
</html>
