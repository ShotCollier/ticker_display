<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Draft Ticker</title>
  <style>
    body {
      margin: 0;
      background: transparent !important;
      overflow: hidden;
      color: white !important;
      font-family: Arial, sans-serif;
    }

    .wrapper {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
    }

    .track {
      display: flex;
      width: max-content;
      will-change: transform;
      animation: scroll 90s linear infinite;
    }

    .ticker-copy {
      flex: 0 0 auto;
      white-space: nowrap;
      padding-right: 120px;
      font-size: 60px;
      font-weight: 800;
      color: white !important;
      -webkit-text-fill-color: white !important;
      text-shadow:
        0 0 3px #fff,
        0 0 6px rgba(255,255,255,0.8);
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="track" id="track">
      <div class="ticker-copy" id="copy1"></div>
      <div class="ticker-copy" id="copy2"></div>
    </div>
  </div>

  <script>
    const API_URL =
      "https://script.google.com/macros/s/AKfycbxua5n-LD77Kl19na_JmIsEX1FXzfs9HE5gUQlhfBVdUYTCtdFlnOeKtmSYiTBxeVl0/exec";

    let lastText = "";

    function buildLongBase(base) {
      let text = base.trim();
      while (text.length < 500) {
        text += " • " + base.trim();
      }
      return text;
    }

    async function loadTicker() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        let base = (data.ticker || "").trim();
        if (!base) return;

        if (base !== lastText) {
          const longText = buildLongBase(base);

          document.getElementById("copy1").innerText = longText;
          document.getElementById("copy2").innerText = longText;

          lastText = base;
        }
      } catch (e) {
        console.log("Ticker load error", e);
      }
    }

    loadTicker();
    setInterval(loadTicker, 10000);
  </script>

</body>
</html>
