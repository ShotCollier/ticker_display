<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Draft Ticker</title>

  <style>
body {
  margin: 0;
  background: transparent !important;
  color: white !important;
}

    .wrapper {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
    }

.ticker {
  display: inline-block;
  padding-left: 100%;
  animation: scroll 65s linear infinite;

  font-size: 60px !important;
  font-weight: 800 !important;
  color: white !important;

  white-space: nowrap;

  /* FORCE VISIBILITY IN OBS */
  background: rgba(0,0,0,0) !important;
  -webkit-text-fill-color: white !important;

  text-shadow:
    0 0 3px #fff,
    0 0 6px rgba(255,255,255,0.8);
}
@keyframes scroll {
  0% { transform: translateX(0%); }
  100% { transform: translateX(-50%); }
}
  </style>
</head>

<body>

<div class="wrapper">
  <div class="ticker" id="ticker"></div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbxua5n-LD77Kl19na_JmIsEX1FXzfs9HE5gUQlhfBVdUYTCtdFlnOeKtmSYiTBxeVl0/exec";

let lastText = "";

async function loadTicker() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    let text = data.ticker || "";

    // Only update if text changed
    if (text !== lastText) {

      // Duplicate text for seamless loop
      text = text + " • " + text + " • " + text;

      document.getElementById("ticker").innerText = text;

      lastText = data.ticker;
    }

  } catch (e) {
    console.log("Ticker load error");
  }
}

// Initial load
loadTicker();

// Check every 10 seconds instead of 5
setInterval(loadTicker, 15000);
</script>

</body>
</html>
