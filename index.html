<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Draft Ticker</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    .wrapper {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
    }

.ticker {
  display: inline-block;
  white-space: nowrap;
  padding-left: 100%;
  animation: scroll 60s linear infinite;
}

@keyframes scroll {
  0% { transform: translateX(0%); }
  100% { transform: translateX(-50%); }
}
  </style>
</head>

<body>

<div class="wrapper">
  <div class="ticker" id="ticker"></div>
</div>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbxua5n-LD77Kl19na_JmIsEX1FXzfs9HE5gUQlhfBVdUYTCtdFlnOeKtmSYiTBxeVl0/exec";

async function loadTicker() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    let text = data.ticker || "";

    // 🔥 DUPLICATE FOR SEAMLESS LOOP
    text = text + " • " + text;

    document.getElementById("ticker").innerText = text;

  } catch (e) {
    document.getElementById("ticker").innerText =
      "LOADING DRAFT DATA...";
  }
}

loadTicker();
setInterval(loadTicker, 5000);
</script>

</body>
</html>
