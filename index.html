<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Draft Ticker</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      font-family: Arial;
    }

    .wrapper {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 25s linear infinite;
      font-size: 28px;
      color: white;
    }

    @keyframes scroll {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div id="ticker" class="ticker"></div>
  </div>

  <script>
    // HARD TEST (no fetch, no external dependencies)
    const el = document.getElementById("ticker");

    if (el) {
      el.innerText =
        "TRAVIS HUNTER (CB, COLORADO) • WILL JOHNSON (CB, MICHIGAN) • KELVIN BANKS (OT, TEXAS)";
    } else {
      document.body.innerHTML = "ELEMENT NOT FOUND";
    }
  </script>

</body>
</html>
